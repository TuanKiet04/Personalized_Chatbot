<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NewsPersona - Hệ thống gợi ý tin tức</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1e293b, #334155); color: white; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.8; max-width: 600px; margin-bottom: 2rem; }
        .btn-group { display: flex; gap: 1rem; }
        .btn { padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: transform 0.2s; }
        .btn-login { background: white; color: #1e293b; }
        .btn-register { background: #2563eb; color: white; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>📰 NewsPersona</h1>
    <p>Trải nghiệm đọc báo cá nhân hóa với sức mạnh của AI. <br>Hệ thống tự động học hỏi sở thích của bạn để mang lại những nội dung giá trị nhất.</p>
    
    <div class="btn-group">
        <a href="/login" class="btn btn-login">Đăng nhập</a>
        <a href="/register" class="btn btn-register">Đăng ký thành viên</a>
    </div>
</body>
</html>
